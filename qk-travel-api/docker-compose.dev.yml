services:
  postgres:
    image: postgres:15-alpine
    container_name: QkTravel-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: QkTravelDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: QkTravel-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
