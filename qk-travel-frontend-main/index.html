    <!-- Structured Data - Organization Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "QkTravel Vietnam",
        "alternateName": "QkTravel",
        "url": "https://qk-travel.vercel.app",
        "logo": "https://qk-travel.vercel.app/logo_name.png",
        "description": "Nền tảng du lịch thông minh tích hợp AI cá nhân hóa lộ trình du lịch Việt Nam",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "VN",
          "addressLocality": "Vietnam"
        },
        "sameAs": [
          "https://facebook.com/qktravel.vn",
          "https://instagram.com/qktravel.vn",
          "https://twitter.com/QkTravelVN"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Service",
          "availableLanguage": ["vi", "en"]
        }
      }
    </script>

    <!-- Structured Data - WebSite Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "QkTravel Vietnam",

        "description": "Nền tảng du lịch thông minh AI - Lập kế hoạch, khách sạn, nhà hàng, Local Buddy",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://qk-travel.vercel.app/destinations?search={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Structured Data - WebApplication Schema -->
